<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' · aerolane'">aerolane</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:fragment="nav" class="topnav" aria-label="Main navigation">
    <a class="brand" th:href="@{/}">aerolane</a>
    <div class="nav-links">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/inspections}">Inspections</a>
        <a th:href="@{/lanes}">Lanes</a>
        <a sec:authorize="hasAnyRole('OFFICER','SUPERVISOR')" class="nav-cta"
           th:href="@{/inspections/new}">Log inspection</a>
    </div>
    <div class="nav-user">
        <span class="who" sec:authentication="name">user</span>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <button type="submit" id="logout" class="btn btn-ghost">Sign out</button>
        </form>
    </div>
</nav>
</body>
</html>
